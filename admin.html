<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="icon" type="image/png" href="./NEU.png">
</head>
<body>

<header class="admin-header">
    <div class="container-fluid">
        <div class="header-content">
            <div class="logo-section">
                <img src="./NEU.png" alt="NEU Logo" class="admin-logo">
                <div>
                    <h4 class="library-title mb-0">NEU Library</h4>
                    <small class="dashboard-subtitle">Admin Dashboard</small>
                </div>
            </div>
            <div class="header-right">
                <span id="adminDate" class="date-small"></span>
                <button id="adminLogout" class="btn-logout-admin">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </div>
</header>

<div class="main-wrapper">
    <div class="container-fluid px-3">
        
        <div class="row g-3 mb-4">
            <div class="col-4"><div class="stat-card today-card"><div class="stat-inner"><i class="fas fa-users"></i><div><h6>Today</h6><h3 id="todayCount">0</h3></div></div></div></div>
            <div class="col-4"><div class="stat-card week-card"><div class="stat-inner"><i class="fas fa-calendar-week"></i><div><h6>Week</h6><h3 id="weekCount">0</h3></div></div></div></div>
            <div class="col-4"><div class="stat-card month-card"><div class="stat-inner"><i class="fas fa-calendar-alt"></i><div><h6>Month</h6><h3 id="monthCount">0</h3></div></div></div></div>
        </div>

        
        <div class="row g-3 mb-4">
            <div class="col-lg-8">
                <div class="chart-card">
                    <h6 class="chart-title">Visitor Traffic</h6>
                    <canvas id="dailyChart" height="200"></canvas>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="chart-card">
                    <h6 class="chart-title">Purpose Distribution</h6>
                    <canvas id="purposeChart" height="200"></canvas>
                </div>
            </div>
        </div>

        
       <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="block-visitors-container">
                <div class="control-card block-card-compact">
                    <h6 class="control-title">Block Visitors</h6>
                    <div class="input-group mb-3">
                        <input type="text" id="blockID" class="form-control" placeholder="Student ID">
                        <button class="btn btn-danger" id="addBlockBtn">Block</button>
                    </div>
                    <div id="blockList" class="block-list"></div>
                </div>
            </div>
        </div>
    </div>

        
        <div class="table-card mb-4">
            <h6 class="table-title">Live Visitors</h6>
            <div class="table-responsive">
                <table class="table-compact">
                    <thead>
                        <tr>
                            <th>Name</th><th>ID</th><th>Course</th><th>Dept</th><th>Purpose</th><th>Time</th><th></th>
                        </tr>
                    </thead>
                    <tbody id="visitorTable"></tbody>
                </table>
            </div>
        </div>

        
        <div class="report-section">
            <h6 class="report-title">Generate Report</h6>
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <input type="date" id="startDate" class="form-control form-control-sm">
                </div>
                <div class="col-md-4">
                    <input type="date" id="endDate" class="form-control form-control-sm">
                </div>
                <div class="col-md-4">
                    <button class="btn btn-primary w-100 py-2" id="generateReport">
                        <i class="fas fa-file-pdf me-1"></i>PDF Report
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

<script type="module">

    
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
        apiKey: "AIzaSyDfc7MLTrpLHVciObB02CdnNIdIEzk2Jvk",
        authDomain: "librarysystem-9f6cd.firebaseapp.com",
        projectId: "librarysystem-9f6cd",
        storageBucket: "librarysystem-9f6cd.firebasestorage.app",
        messagingSenderId: "617348451553",
        appId: "1:617348451553:web:dfd4c28c04a7ddac32bba0",
        measurementId: "G-J51H7101CW"
        };


        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);


        //========================================================

        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, getDocs, query, orderBy, deleteDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const tableBody = document.getElementById("visitorTable");
        const blockList = document.getElementById("blockList");
        const logoutBtn = document.getElementById("adminLogout");
        const blockBtn = document.getElementById("addBlockBtn");
        const reportBtn = document.getElementById("generateReport");

        let allLogs = []; 
        let dailyChart, purposeChart; 

        async function loadDashboard() {
            try {
                
                const q = query(collection(db, "visitorLogs"), orderBy("timeIn", "desc"));
                const querySnapshot = await getDocs(q);
                
                tableBody.innerHTML = "";
                allLogs = [];
                const now = new Date();
                let stats = { today: 0, week: 0, month: 0 };
                let purposeData = {}, dailyData = {};

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const logDate = (data.timeIn && data.timeIn.toDate) ? data.timeIn.toDate() : new Date();
                    const logId = docSnap.id;
                    
                    allLogs.push({ ...data, id: logId, dateObj: logDate });
                    
                    if (logDate.toDateString() === now.toDateString()) stats.today++;
                    purposeData[data.purpose] = (purposeData[data.purpose] || 0) + 1;
                    dailyData[logDate.toLocaleDateString()] = (dailyData[logDate.toLocaleDateString()] || 0) + 1;

                    tableBody.innerHTML += `<tr>
                        <td>${data.name}</td>
                        <td>${data.studentID}</td>
                        <td>${data.course}</td>
                        <td>${data.department}</td>
                        <td><span class="badge bg-primary">${data.purpose}</span></td>
                        <td>${logDate.toLocaleString()}</td>
                        <td><button class="btn btn-sm btn-outline-danger" onclick="deleteEntry('${logId}')">🗑️</button></td>
                    </tr>`;
                });

                document.getElementById("todayCount").innerText = stats.today;
                
            
                const blockSnap = await getDocs(collection(db, "blockedUsers"));
                blockList.innerHTML = "";
                blockSnap.forEach(d => {
                    blockList.innerHTML += `<li class="list-group-item d-flex justify-content-between">
                        ${d.data().studentID} 
                        <button class="btn btn-sm btn-outline-secondary" onclick="unblockUser('${d.id}')">Unblock</button>
                    </li>`;
                });

                renderCharts(dailyData, purposeData);
            } catch (e) { console.error("Load Error:", e); }
        }


        logoutBtn.addEventListener("click", async () => {
            try {
                await signOut(auth);
                alert("You have been logged out.");
                window.location.href = "index.html";
            } catch (error) {
                console.error("Logout failed:", error);
            }
        });

        blockBtn.addEventListener("click", async () => {
            const id = document.getElementById("blockID").value;
            if(id) { 
                await addDoc(collection(db, "blockedUsers"), { studentID: id }); 
                document.getElementById("blockID").value = "";
                loadDashboard(); 
            }
        });


        window.deleteEntry = async (id) => { 
            if(confirm("Delete this log?")) {
                await deleteDoc(doc(db, "visitorLogs", id)); 
                loadDashboard(); 
            }
        };

        window.unblockUser = async (id) => { 
            await deleteDoc(doc(db, "blockedUsers", id)); 
            loadDashboard(); 
        };

        reportBtn.addEventListener("click", () => {
            const doc = new window.jspdf.jsPDF();
            doc.text("NEU Library Visitor Report", 14, 20);
            doc.autoTable({
                head: [['Name', 'Student ID', 'Course', 'Purpose', 'Department', 'Time In']],
                body: allLogs.map(l => [l.name, l.studentID, l.course, l.purpose, l.department, l.dateObj.toLocaleString()]),
                startY: 35
            });
            doc.save("Library_Report.pdf");
        });

        function renderCharts(daily, purposes) {
            if (dailyChart) dailyChart.destroy();
            if (purposeChart) purposeChart.destroy();
            dailyChart = new Chart(document.getElementById('dailyChart'), { type: 'line', data: { labels: Object.keys(daily), datasets: [{ label: 'Visitors', data: Object.values(daily), borderColor: '#004a99' }] } });
            purposeChart = new Chart(document.getElementById('purposeChart'), { type: 'doughnut', data: { labels: Object.keys(purposes), datasets: [{ data: Object.values(purposes), backgroundColor: ['#004a99', '#007bff', '#6610f2'] }] } });
        }

        loadDashboard();

</script>
</body>
</html>
